services:
  db:
    image: postgres:16-alpine
    container_name: hearth-db
    environment:
      POSTGRES_USER: hearth
      POSTGRES_PASSWORD: hearth_secret
      POSTGRES_DB: hearth
    ports:
      - "5434:5432"
    volumes:
      - hearth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearth"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: hearth-app
    ports:
      - "3111:3111"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://hearth:hearth_secret@db:5432/hearth?schema=public
      WATCHPACK_POLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    stdin_open: true
    tty: true

volumes:
  hearth_postgres_data:
